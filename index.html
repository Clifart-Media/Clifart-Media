<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clifart Media - Professional Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Hero Section -->
    <header class="hero">
        <h1>Welcome to Clifart Media</h1>
        <p>Your partner in creativity and innovation.</p>
        <a href="#contact" class="cta-button">Get in Touch</a>
    </header>

    <!-- Gallery Section -->
    <section class="gallery">
        <h2>Our Work</h2>
        <div class="gallery-grid">
            <img src="image1.jpg" alt="Gallery Image 1" class="gallery-item">
            <img src="image2.jpg" alt="Gallery Image 2" class="gallery-item">
            <img src="image3.jpg" alt="Gallery Image 3" class="gallery-item">
            <!-- More images -->
        </div>
    </section>

    <!-- Client Reviews Section -->
    <section class="reviews">
        <h2>What Our Clients Say</h2>
        <blockquote>
            <p>"Clifart Media transformed our brand image!"</p>
            <cite>- Happy Client</cite>
        </blockquote>
        <blockquote>
            <p>"Professional, creative, and results-driven."</p>
            <cite>- Satisfied Customer</cite>
        </blockquote>
        <!-- More reviews -->
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact">
        <h2>Contact Us</h2>
        <form action="#" method="post">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
