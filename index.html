<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clifart Media</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>

    <!-- Hero Section -->
    <header class="hero" style="background: linear-gradient(to right, #6a11cb, #2575fc);">
        <h1>Welcome to Clifart Media</h1>
        <p>Your vision, our creativity.</p>
    </header>

    <!-- Gallery Section -->
    <section class="gallery">
        <h2>Our Work</h2>
        <div class="grid">
            <img src="image1.jpg" alt="Project 1" />
            <img src="image2.jpg" alt="Project 2" />
            <img src="image3.jpg" alt="Project 3" />
            <img src="image4.jpg" alt="Project 4" />
        </div>
    </section>

    <!-- Client Reviews Section -->
    <section class="reviews">
        <h2>What Our Clients Say</h2>
        <blockquote>
            <p>\"Clifart Media transformed our business!\" - Client A</p>
        </blockquote>
        <blockquote>
            <p>\"A fantastic team that delivers results!\" - Client B</p>
        </blockquote>
    </section>

    <!-- Contact Section -->
    <section class="contact">
        <h2>Contact Us</h2>
        <form>
            <input type="text" placeholder="Your Name" required />
            <input type="email" placeholder="Your Email" required />
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

</body>
</html>
